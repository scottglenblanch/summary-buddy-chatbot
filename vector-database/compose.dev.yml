# Vector database service - development (PostgreSQL with pgvector extension)
# Run from this folder: docker compose -f compose.dev.yml up -d --build postgres
services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: summary-buddy-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-summary_buddy_chatbot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - summary-buddy-network

volumes:
  postgres_data_dev:
    driver: local

networks:
  summary-buddy-network:
    external: true
