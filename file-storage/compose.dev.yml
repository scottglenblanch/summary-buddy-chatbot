# File storage service - development (MinIO S3-compatible object storage)
# Run from this folder: docker compose -f compose.dev.yml up -d --build minio
# In AWS this is replaced by a real S3 bucket.
services:
  minio:
    image: minio/minio:latest
    container_name: summary-buddy-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_dev:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - summary-buddy-network

volumes:
  minio_data_dev:
    driver: local

networks:
  summary-buddy-network:
    external: true
