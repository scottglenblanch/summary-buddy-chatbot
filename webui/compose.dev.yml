# Frontend service - development (Vite dev server)
# Run from this folder: docker compose -f compose.dev.yml up -d --build frontend
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: summary-buddy-frontend-dev
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - /app/node_modules
    networks:
      - summary-buddy-network
    command: pnpm run dev -- --host 0.0.0.0

networks:
  summary-buddy-network:
    external: true
