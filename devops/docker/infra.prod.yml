# Shared infrastructure - production (PostgreSQL + MinIO)
# Included by docker-compose.yml
services:
  # PostgreSQL Database (with pgvector extension)
  postgres:
    image: pgvector/pgvector:pg15
    container_name: summary-buddy-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-summary_buddy_chatbot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - summary-buddy-network

  # MinIO - S3-compatible object storage for uploaded files (local dev)
  # In AWS this is replaced by a real S3 bucket.
  minio:
    image: minio/minio:latest
    container_name: summary-buddy-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - summary-buddy-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  summary-buddy-network:
    driver: bridge
