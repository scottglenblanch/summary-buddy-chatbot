# Backend service - production (gunicorn)
# Included by devops/docker/docker-compose.yml
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: summary-buddy-backend
    env_file:
      - ../.env
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-summary_buddy_chatbot}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-summary-buddy-uploads}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      PGVECTOR_COLLECTION_NAME: ${PGVECTOR_COLLECTION_NAME:-summary_buddy}
      PDF_DIR: /app/resources
      UPLOADS_DIR: /app/resources/uploads
      EXTRACTED_TEXTS_DIR: /app/resources/summary_buddy_texts
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ../resources:/app/resources
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - summary-buddy-network
    command: gunicorn --workers 4 --worker-class sync --bind 0.0.0.0:5000 --timeout 120 --access-logfile - --error-logfile - wsgi:app

networks:
  summary-buddy-network:
    driver: bridge
