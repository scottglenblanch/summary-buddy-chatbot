# Backend service - development (hot reload)
# Included by devops/docker/docker-compose.dev.yml
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: summary-buddy-backend-dev
    env_file:
      - ../.env
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 1
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-summary_buddy_chatbot}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-summary-buddy-uploads}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      PGVECTOR_COLLECTION_NAME: ${PGVECTOR_COLLECTION_NAME:-summary_buddy}
      PDF_DIR: /app/resources
      UPLOADS_DIR: /app/resources/uploads
      EXTRACTED_TEXTS_DIR: /app/resources/summary_buddy_texts
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ../resources:/app/resources
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - summary-buddy-network
    command: python -m app.main

networks:
  summary-buddy-network:
    driver: bridge
