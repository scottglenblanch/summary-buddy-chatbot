# Production configuration
# Non-secret settings live here. Secrets are referenced as ${VAR}
# and resolved from api-server/.env at load time.

FLASK_ENV: production
FLASK_DEBUG: "0"
SECRET_KEY: ${SECRET_KEY}

# Database
DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/summary_buddy_chatbot

# CORS
CORS_ORIGINS: https://your-production-domain.com

# OpenAI API
OPENAI_API_KEY: ${OPENAI_API_KEY}

# AWS Configuration
AWS_REGION: us-east-1
AWS_S3_BUCKET: your-s3-bucket-name
AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

# File & Directory Paths
PDF_DIR: /app/resources
UPLOADS_DIR: /app/resources/uploads
EXTRACTED_TEXTS_DIR: /app/resources/summary_buddy_texts

# Storage backend: "s3" (S3 in AWS, MinIO container locally) or "local"
STORAGE_BACKEND: s3
# Leave unset for real AWS S3
AWS_S3_ENDPOINT_URL: ""

# PostgreSQL + pgvector Vector Database
PGVECTOR_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/summary_buddy_chatbot
PGVECTOR_COLLECTION_NAME: summary_buddy

# RAG Settings
CHUNK_SIZE: "1000"
CHUNK_OVERLAP: "200"
RAG_K_RESULTS: "4"
